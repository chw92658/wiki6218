<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>乾媽智囊團</title>
<style>
:root{
  --br:#6B4226;--brl:#8B5A3A;--brd:#4A2C18;--brbg:#FDF6F0;
  --cr:#FAF0E6;--gold:#C9A96E;--tx:#2C1810;--txl:#6B4226;
  --gray:#888;--bor:#E8D5C4;--wh:#fff;
  --hh:48px;--fh:64px;
  --cat-c:#8B6914;--cat-bg:#FFF8E1;
}
body.dark{
  --br:#C9A96E;--brl:#D4B87A;--brd:#E8D5A0;--brbg:#2A2018;
  --cr:#1A1510;--gold:#C9A96E;--tx:#F0E6D8;--txl:#C9A96E;
  --gray:#777;--bor:#3A2C1E;--wh:#231A10;
  --cat-c:#E8C84A;--cat-bg:#2A2010;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Helvetica Neue','PingFang TC','Noto Sans TC',sans-serif;background:var(--cr);color:var(--tx);touch-action:pan-y;transition:background .3s,color .3s}
#hdr{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--hh);background:var(--br);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
body.dark #hdr{background:#2A1A08}
#hdr h1{color:var(--gold);font-size:16px;font-weight:700;letter-spacing:.05em}
#dtog{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 10px;color:var(--gold);font-size:13px;cursor:pointer}
#ftr{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--fh);background:var(--br);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px 8px 4px;box-shadow:0 -2px 8px rgba(0,0,0,.2)}
body.dark #ftr{background:#2A1A08}
.ftr-pills{display:flex;gap:7px;align-items:center}
.ftr-hint{font-size:10px;color:rgba(201,169,110,0.6);letter-spacing:.02em}
.np{padding:5px 12px;border-radius:20px;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;user-select:none}
.np.on{background:var(--gold);color:#4A2C18;font-weight:700}
#pgs{position:fixed;top:var(--hh);bottom:var(--fh);left:0;right:0;overflow:hidden}
.pg{position:absolute;top:0;bottom:0;left:0;right:0;overflow-y:auto;overflow-x:hidden;background:var(--cr);transition:transform .3s cubic-bezier(.4,0,.2,1);-webkit-overflow-scrolling:touch}
.pg.hl{transform:translateX(-100%)}
.pg.hr{transform:translateX(100%)}
.pg.on{transform:translateX(0)}
#pg0{padding:16px 14px 20px}
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.hcard{background:var(--wh);border-radius:14px;border:1.5px solid var(--bor);padding:14px;cursor:pointer;aspect-ratio:1;display:flex;flex-direction:column;position:relative;box-shadow:0 2px 8px rgba(107,66,38,.06);transition:transform .15s}
.hcard:active{transform:scale(.97)}
.hcard .hico{font-size:22px}
.hcard .hlbl{font-size:13px;color:var(--txl);font-weight:600;margin-top:6px}
.hcard .hnum{position:absolute;left:14px;bottom:12px;font-size:34px;font-weight:900;color:var(--br);line-height:1}
.hcred{text-align:center;margin-top:4px}
.cred-pill{display:inline-block;padding:5px 16px;border-radius:20px;border:1.5px solid #ccc;color:#999;font-size:11px}
/* SEARCH */
.sw{padding:10px 14px 6px;background:var(--cr);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--bor)}
.sr{position:relative;display:flex;align-items:center}
.si{width:100%;padding:9px 34px 9px 13px;border-radius:24px;border:1.5px solid var(--bor);background:var(--wh);font-size:14px;color:var(--tx);outline:none;transition:border-color .2s}
.si:focus{border-color:var(--br)}
.sc{position:absolute;right:11px;color:var(--gray);font-size:15px;cursor:pointer;padding:4px;display:none;line-height:1}
.sc.show{display:block}
/* FILTERS */
.fs{padding:6px 14px 2px}
.fg{margin-bottom:3px}
.ftog{display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 0;font-size:12px;color:var(--br);font-weight:600;user-select:none}
.ftog .arr{font-size:9px;transition:transform .2s;display:inline-block}
.ftog.op .arr{transform:rotate(90deg)}
.fcnt{color:var(--gray);font-weight:400}
.fal{color:var(--brl);font-size:11px;background:var(--brbg);padding:1px 7px;border-radius:8px}
.cw{display:flex;flex-wrap:wrap;gap:5px;padding:5px 0 3px}
.ch{padding:4px 11px;border-radius:16px;border:1.5px solid var(--bor);font-size:12px;color:var(--txl);cursor:pointer;background:var(--wh);transition:all .15s;white-space:nowrap}
.ch.on{background:var(--br);color:var(--wh);border-color:var(--br)}
.ch:active{opacity:.7}
.clr-btn{margin:4px 0 2px;padding:4px 12px;border-radius:14px;border:1.5px solid #e08060;color:#e08060;font-size:11px;font-weight:600;cursor:pointer;background:var(--wh);display:inline-block}
.clr-btn:active{background:#e08060;color:#fff}
/* LIST */
.lc{padding:4px 14px 20px}
.rc{font-size:12px;color:var(--gray);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.top-btn{font-size:11px;color:var(--br);background:var(--brbg);border:1px solid var(--bor);border-radius:12px;padding:3px 10px;cursor:pointer}
/* ITEM CARDS */
.ic{background:var(--wh);border-radius:12px;border:1.5px solid var(--bor);margin-bottom:9px;overflow:hidden;box-shadow:0 1px 4px rgba(107,66,38,.05)}
.ih{padding:11px 13px 9px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ih:active{background:rgba(107,66,38,.03)}
.in{font-size:15px;font-weight:700;color:var(--tx);line-height:1.3}
.im{font-size:11px;color:var(--gray);margin-top:3px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.mcat{color:var(--cat-c);font-weight:600;background:var(--cat-bg);padding:1px 7px;border-radius:8px;font-size:11px}
.ieb{color:var(--br);font-size:13px;flex-shrink:0;padding-top:2px}
.idet{border-top:1px solid var(--bor);padding:11px 13px;display:none}
.idet.op{display:block}
.rev{font-size:13px;color:var(--tx);line-height:1.6;white-space:pre-wrap;margin-bottom:10px}
.lnks{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.lnk{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;transition:all .15s;border:1.5px solid}
.lnk-g{border-color:#D32F2F;color:#D32F2F}.lnk-g:active{background:#D32F2F;color:#fff}
.lnk-f{border-color:#1877F2;color:#1877F2}.lnk-f:active{background:#1877F2;color:#fff}
.lnk-i{border-color:#E4621B;color:#E4621B}.lnk-i:active{background:#E4621B;color:#fff}
.lnk-w{border-color:#888;color:#888}.lnk-w:active{background:#888;color:#fff}
/* COLLAPSIBLE SECTIONS */
.csec{margin-top:8px;border-top:1px dashed var(--bor);padding-top:7px}
.ctog{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:700;color:var(--br);padding:3px 0;user-select:none}
.ctog .carr{font-size:9px;transition:transform .2s;display:inline-block}
.ctog.op .carr{transform:rotate(90deg)}
.cbody{display:none;padding-top:5px}
.cbody.op{display:block}
.ci{font-size:12px;color:var(--txl);padding:4px 0;cursor:pointer;border-bottom:1px solid rgba(107,66,38,.05);display:flex;gap:5px;align-items:center;line-height:1.4}
.ci:last-child{border-bottom:none}
.ci:active{color:var(--br)}
.ci-sq{width:6px;height:6px;background:var(--br);border-radius:1px;flex-shrink:0;margin-top:3px}
.ci-cat{color:var(--cat-c);font-size:10px;background:var(--cat-bg);padding:1px 5px;border-radius:6px;margin-left:4px;font-weight:600}
.nb-none{font-size:12px;color:var(--gray);font-style:italic;padding:3px 0}
/* Q CARDS */
.qc{background:var(--wh);border-radius:12px;border:1.5px solid var(--bor);margin-bottom:8px;padding:11px 13px;box-shadow:0 1px 4px rgba(107,66,38,.05)}
.qc.hot{border-color:#ff4444;border-width:2px}
.qt{font-size:14px;font-weight:600;color:var(--tx);line-height:1.4;display:flex;align-items:flex-start;gap:7px}
.qsq{width:8px;height:8px;background:var(--br);border-radius:2px;flex-shrink:0;margin-top:4px}
.qr2{display:flex;gap:8px;align-items:center;margin-top:4px;padding-left:15px;flex-wrap:wrap}
.qdate{font-size:11px;color:var(--gray)}
.qhot{font-size:11px;padding:2px 8px;border-radius:10px;border:1.5px solid #ff4444;color:#ff4444;font-weight:600}
.qtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;padding-left:15px}
.qtag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.qtag-n{background:#E8F4FF;color:#1565C0}
.qtag-w{background:#E8F5E9;color:#2E7D32}
.qtag-s{background:#FFF3E0;color:#E65100}
.qtag-e{background:#F3E5F5;color:#6A1B9A}
.qtag-i{background:#FCE4EC;color:#AD1457}
.qtag-t{background:var(--brbg);color:var(--br)}
.empty{text-align:center;padding:40px 20px;color:var(--gray);font-size:14px}

/* NOTICE */
.notice-box{margin:0 0 12px;padding:12px 14px;border-radius:12px;border:1.5px solid var(--bor);background:var(--wh);font-size:12px;color:var(--txl);line-height:1.8}
.notice-red{color:#cc0000;font-weight:700}
/* VIS BADGE */
.vis-badge{font-size:11px;color:var(--gold);background:rgba(0,0,0,.2);padding:2px 8px;border-radius:10px;white-space:nowrap;pointer-events:none;position:absolute;left:12px;top:50%;transform:translateY(-50%)}
/* HOME */
.home-inner{max-width:480px;margin:0 auto;padding:16px 14px 20px}
/* GP CARD */
.gp-card{background:var(--wh);border-radius:14px;border:1.5px solid var(--bor);padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(107,66,38,.06)}
.gp-header{display:flex;align-items:center;gap:10px;cursor:pointer}
.gp-ico{font-size:22px}.gp-info{flex:1}
.gp-title{font-size:13px;font-weight:600;color:var(--txl)}
.gp-num{font-size:28px;font-weight:900;color:var(--br);line-height:1}
.gp-arr{color:var(--br);font-size:13px;transition:transform .2s;flex-shrink:0}
.gp-arr.op{transform:rotate(180deg)}
.gp-body{display:none;margin-top:10px;border-top:1px solid var(--bor);padding-top:10px}
.gp-body.op{display:block}
.gp-item{border:1px solid var(--bor);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--brbg)}
.gp-item:last-child{margin-bottom:0}
.gp-item-name{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px}
.gp-item-row{font-size:11px;color:var(--gray);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.gp-cd{font-size:12px;font-weight:700;padding:2px 8px;border-radius:8px;background:#FFF0E6;color:#C06020}
.gp-cd.urg{background:#FFE6E6;color:#C02020}
.gp-link{color:var(--br);font-size:12px;text-decoration:underline;font-weight:600}
/* BOTTOM CREDIT */
.bottom-cred{text-align:center;padding:6px 0 4px}
/* FILTER HEADER ROW with inline clear */
.fg-hrow{display:flex;align-items:center;justify-content:space-between}
.clr-inline{font-size:11px;color:#e08060;border:1.5px solid #e08060;border-radius:12px;padding:3px 10px;cursor:pointer;background:var(--wh);font-weight:600;white-space:nowrap;flex-shrink:0}
.clr-inline:active{background:#e08060;color:#fff}
/* DARK MODE FIX - footer */
body.dark #ftr{background:#1A1008}
body.dark .np{border-color:#C9A96E;color:#C9A96E}
body.dark .np.on{background:#C9A96E;color:#1A1008}
body.dark .ftr-hint{color:rgba(201,169,110,0.4)}
/* CITY BADGE */
.meta-city{font-size:11px;color:#1565C0;background:#E8F4FF;padding:1px 7px;border-radius:8px;font-weight:600}
/* NOTION NOTICE */
.notion-notice{display:inline-block;color:#cc0000;font-weight:700;text-decoration:underline;font-size:12px;padding:3px 8px;border:1.5px solid #cc0000;border-radius:8px}
/* NEARBY */
.nb-none{font-size:12px;color:var(--gray);font-style:italic;padding:3px 0}
.nb-more{font-size:11px;color:var(--br);cursor:pointer;padding:3px 0;font-weight:600}
</style>
</head>
<body>

<script id="dbdata" type="application/json">DATA_PLACEHOLDER</script>

<div id="hdr" style="position:fixed;top:0;left:0;right:0;z-index:200;height:var(--hh);background:var(--br);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)">
  <span class="vis-badge" id="vis-0"></span>
  <h1 style="color:var(--gold);font-size:16px;font-weight:700;letter-spacing:.05em">乾媽智囊團</h1>
  <button id="dtog" onclick="toggleDark()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 10px;color:var(--gold);font-size:13px;cursor:pointer">🌙</button>
</div>

<div id="pgs">

  <div class="pg on" id="pg0">
    <div class="home-inner">
      <div class="notice-box">
<p>• 因notion不方便手機操作，故用AI做了網站，僅有收錄推薦的店家，無對話截圖，完整內容請至notion版乾媽智囊團</p>
<p class="notice-red">• notion版乾媽智囊團僅提供給實名制的乾媽群，並未提供給未實名制的團購群也不開放索取</p>
</div>
      <div id="hgrid" class="hgrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"></div>
      <div class="gp-card">
        <div class="gp-header" onclick="togGP()">
          <div class="gp-ico">🛒</div>
          <div class="gp-info">
            <div class="gp-title">目前團購</div>
            <div class="gp-num" id="gp-count">0</div>
          </div>
          <div class="gp-arr" id="gp-arr">▼</div>
        </div>
        <div class="gp-body" id="gp-body"></div>
      </div>
      <div class="bottom-cred"><span class="cred-pill">BY 新北三重-Alice wang1️⃣🌰</span></div>
    </div>
  </div>

  <div class="pg hr" id="pg1">
    <div class="sw">
      <div class="sr">
        <input class="si" id="si-q" placeholder="搜尋問題..." oninput="onSI('q')">
        <span class="sc" id="sc-q" onclick="clearSI('q')">✕</span>
      </div>
    </div>
    <div class="fs" id="fs-q"></div>
    <div class="lc">
      <div class="rc"><span id="rc-q"></span><span class="top-btn" onclick="backTop('pg1')">⬆ 頂端</span></div>
      <div id="ql"></div>
      <div style="text-align:center;padding:12px 0 4px"><span class="top-btn" onclick="backTop('pg1')">⬆ 回到頂端</span></div>
    </div>
  </div>

  <div class="pg hr" id="pg2">
    <div class="sw">
      <div class="sr">
        <input class="si" id="si-f" placeholder="搜尋美食..." oninput="onSI('f')">
        <span class="sc" id="sc-f" onclick="clearSI('f')">✕</span>
      </div>
    </div>
    <div class="fs" id="fs-f"></div>
    <div class="lc">
      <div class="rc"><span id="rc-f"></span><span class="top-btn" onclick="backTop('pg2')">⬆ 頂端</span></div>
      <div id="fl"></div>
      <div style="text-align:center;padding:12px 0 4px"><span class="top-btn" onclick="backTop('pg2')">⬆ 回到頂端</span></div>
    </div>
  </div>
  <div class="pg hr" id="pg3">
    <div class="sw">
      <div class="sr">
        <input class="si" id="si-h" placeholder="搜尋住宿..." oninput="onSI('h')">
        <span class="sc" id="sc-h" onclick="clearSI('h')">✕</span>
      </div>
    </div>
    <div class="fs" id="fs-h"></div>
    <div class="lc">
      <div class="rc"><span id="rc-h"></span><span class="top-btn" onclick="backTop('pg3')">⬆ 頂端</span></div>
      <div id="hl"></div>
      <div style="text-align:center;padding:12px 0 4px"><span class="top-btn" onclick="backTop('pg3')">⬆ 回到頂端</span></div>
    </div>

  <div class="pg hr" id="pg4">
    <div class="sw">

        <span class="sc" id="sc-s" onclick="clearSI('s')">✕</span>
      </div>
    </div>
    <div class="fs" id="fs-s"></div>
    <div class="lc">
      <div class="rc"><span id="rc-s"></span><span class="top-btn" onclick="backTop('pg4')">⬆ 頂端</span></div>
      <div id="sl"></div>
      <div style="text-align:center;padding:12px 0 4px"><span class="top-btn" onclick="backTop('pg4')">⬆ 回到頂端</span></div>
    </div>
  </div>

</div>

<div id="ftr" style="position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--br);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px 8px 4px;box-shadow:0 -2px 8px rgba(0,0,0,.2)">
  <div class="ftr-pills">
    <div class="np on" data-p="0" onclick="npClick(0)">首頁</div>
    <div class="np" data-p="1" onclick="npClick(1)">問題</div>

  </div>
  <div class="ftr-hint">點一下切換頁面（也可左右滑動），點兩下回到頁面頂端</div>
</div>

<script>// 乾媽智囊團 - Main JS
// This file is embedded directly into index.html

const DB=JSON.parse(document.getElementById('dbdata').textContent);
const Q=DB.q,F=DB.f,H=DB.h,S=DB.s;

// ===== CONSTANTS =====
const REGION_ORDER=['北部','西部','南部','東部','離島'];
const REGIONS={
  '北部':['基隆','台北','新北','桃園','新竹','宜蘭'],
  '西部':['苗栗','台中','彰化','南投'],
  '南部':['雲林','嘉義','台南','高雄','屏東','澎湖'],
  '東部':['花蓮','台東'],
  '離島':['金門','馬祖'],
};
const CITY_ORDER=[];
REGION_ORDER.forEach(r=>REGIONS[r].forEach(c=>{if(!CITY_ORDER.includes(c))CITY_ORDER.push(c)}));
const CITY_REGION={};
Object.entries(REGIONS).forEach(([r,cs])=>cs.forEach(c=>CITY_REGION[c]=r));
const REGION_CLS={'北部':'n','西部':'w','南部':'s','東部':'e','離島':'i'};
const LOC_TAGS=new Set([...Object.values(REGIONS).flat(),'出國','日本','韓國','泰國','歐洲','港澳']);
const TOPIC_PRI=['美食','住宿','旅遊'];

const CAT={
  'A.小吃':'小吃','B.餐廳':'餐廳','C.甜點':'甜點','D.咖啡廳':'咖啡廳',
  'E.火鍋類':'火鍋','F.燒肉':'燒肉','G.牛排':'牛排','H.鐵板燒':'鐵板燒',
  'I.早午餐':'早午餐','J.麵包西餅店':'麵包甜點','K.海鮮':'海鮮',
  'L.中式糕餅':'中式糕餅','M.飲料':'飲料','N.炸物':'炸物','O.冰品':'冰品',
  'P.日式':'日式','Q.韓式':'韓式','R.義式':'義式','S.泰式':'泰式',
  'T.港式':'港式','U.伴手禮':'伴手禮','V.餐酒館':'餐酒館','W.居酒屋':'居酒屋',
  'X.早餐':'早餐','Y.喜餅/彌月':'喜餅彌月','Z.素食':'素食','Z1.酒吧':'酒吧','Z2.其他':'其他'
};
const CAT_REV={};
Object.entries(CAT).forEach(([k,v])=>CAT_REV[v]=k);

// ===== INDICES =====
const DIST_IDX={};
function addDI(arr,key){
  arr.forEach(x=>{
    const city=(x.city_tags&&x.city_tags.length)?x.city_tags[0]:(x.city||'').split(',')[0].trim();
    const dist=x.district||'';
    if(!city||!dist||dist==='有分店')return;
    const k=city+':'+dist;
    if(!DIST_IDX[k])DIST_IDX[k]={f:[],h:[],s:[]};
    DIST_IDX[k][key].push(x);
  });
}
addDI(F,'f');addDI(H,'h');addDI(S,'s');

function buildDM(arr){
  const m={};
  arr.forEach(x=>{
    const cities=x.city_tags&&x.city_tags.length?x.city_tags:[(x.city||'').split(',')[0].trim()];
    const dist=x.district;
    if(!dist||dist==='有分店')return;
    cities.forEach(city=>{
      if(!city)return;
      if(!m[city])m[city]={};
      if(!m[city][dist])m[city][dist]=[];
      m[city][dist].push(x);
    });
  });
  return m;
}
const FDM=buildDM(F),HDM=buildDM(H),SDM=buildDM(S);

function buildCatMap(arr){
  const m={};
  arr.forEach(x=>{
    if(!x.cat)return;
    const cities=x.city_tags&&x.city_tags.length?x.city_tags:[(x.city||'').split(',')[0].trim()];
    cities.forEach(city=>{
      if(!city)return;
      if(!m[city])m[city]=new Set();
      m[city].add(x.cat);
    });
  });
  return m;
}
const F_CAT_MAP=buildCatMap(F);

// ===== DOUBLE TAP NAV =====
const _lastTap={};
function npClick(i){
  const now=Date.now();
  if(_lastTap[i]&&now-_lastTap[i]<400){
    const el=document.getElementById(PGS[i]);
    if(el)el.scrollTop=0;
    _lastTap[i]=0;
    return;
  }
  _lastTap[i]=now;
  goPage(i);
}

// ===== NAVIGATION =====
function goPage(i){
  const prev=curPg;curPg=i;
  PGS.forEach((id,j)=>{
    const el=document.getElementById(id);
    el.className='pg '+(j===i?'on':j<i?'hl':'hr');
  });
  document.querySelectorAll('.np').forEach(p=>p.classList.toggle('on',+p.dataset.p===i));
  if(prev!==i){
    const pk=[null,'q','f','h','s'][prev];
    if(pk&&pk!=='q')clearFilters(pk,false);
  }
  const k=[null,'q','f','h','s'][i];
  if(k&&!INITED[k]){INITED[k]=1;window['init_'+k]();}
  if(typeof onPageVisit==='function')setTimeout(()=>onPageVisit(i),50);
}

// Swipe
let tx=0,ty=0;
document.getElementById('pgs').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.getElementById('pgs').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>65&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&curPg<4)goPage(curPg+1);
    else if(dx>0&&curPg>0)goPage(curPg-1);
  }
},{passive:true});

function clearFilters(type,refilter=true){
  Object.keys(ST[type]).forEach(k=>ST[type][k]='');
  if(!refilter)return;
  if(type==='f'){rebuildFSub();filterF();}
  else if(type==='h'){rebuildHSub();filterH();}
  else if(type==='s'){rebuildSSub();filterS();}
  else filterQ();
  document.querySelectorAll('[id^="fc-'+type+'"]').forEach(el=>el.querySelectorAll('.ch').forEach(c=>c.classList.remove('on')));
  document.querySelectorAll('[id^="ft-'+type+'"]').forEach(el=>{const l=el.querySelector('.fal');if(l)l.remove();});
}

function togF(cid,fid){
  const col=document.getElementById(cid),tog=document.getElementById(fid);
  const op=col.style.display==='none';
  col.style.display=op?'block':'none';
  tog.classList.toggle('op',op);
}
function selCh(type,key,val,el){
  const wasOn=el.classList.contains('on');
  el.closest('[id^="fc-"]').querySelectorAll('.ch').forEach(c=>c.classList.remove('on'));
  const nv=wasOn?'':val;
  if(!wasOn)el.classList.add('on');
  const tog=document.getElementById('ft-'+type+'-'+key);
  if(tog){const old=tog.querySelector('.fal');if(old)old.remove();if(nv){const s=document.createElement('span');s.className='fal';s.textContent=nv;tog.appendChild(s);}}
  ST[type][key]=nv;
  if(type==='q'){if(key==='loc')updateQTopicChips(nv);filterQ();}
  else if(type==='f'){
    if(key==='city'){clearSI('f');ST.f.dist='';ST.f.cat='';rebuildFSub(nv);}
    filterF();
  }
  else if(type==='h'){if(key==='city'){clearSI('h');ST.h.dist='';rebuildHSub(nv);}filterH();}
  else if(type==='s'){if(key==='city'){clearSI('s');ST.s.dist='';rebuildSSub(nv);}filterS();}
}

function getCities(arr){
  const s=new Set();
  arr.forEach(x=>{
    const cities=x.city_tags&&x.city_tags.length?x.city_tags:[(x.city||'').split(',')[0].trim()];
    cities.forEach(c=>{if(c&&c!=='有分店')s.add(c);});
  });
  return CITY_ORDER.filter(c=>s.has(c));
}

function init_q(){
  const locs=[...LOC_TAGS].filter(t=>Q.some(x=>x.tags.includes(t)));
  const locOrd=CITY_ORDER.filter(c=>locs.includes(c));
  locs.filter(t=>!locOrd.includes(t)).forEach(t=>locOrd.push(t));
  const topicSet=new Set();
  Q.forEach(x=>x.tags.forEach(t=>{if(!LOC_TAGS.has(t))topicSet.add(t)}));
  const topOrd=[];
  TOPIC_PRI.forEach(t=>{if(topicSet.has(t))topOrd.push(t)});
  [...topicSet].filter(t=>!topOrd.includes(t)).sort().forEach(t=>topOrd.push(t));
  document.getElementById('fs-q').innerHTML=mkFGwithClr('q','loc','地區',locOrd,ST.q.loc)+mkFG('q','topic','主題',topOrd,ST.q.topic);
  filterQ();
}
function updateQTopicChips(locTag){
  const arr=locTag?Q.filter(x=>x.tags.includes(locTag)):Q;
  const topicSet=new Set();
  arr.forEach(x=>x.tags.forEach(t=>{if(!LOC_TAGS.has(t))topicSet.add(t)}));
  const topOrd=[];
  TOPIC_PRI.forEach(t=>{if(topicSet.has(t))topOrd.push(t)});
  [...topicSet].filter(t=>!topOrd.includes(t)).sort().forEach(t=>topOrd.push(t));
  const col=document.getElementById('fc-q-topic');
  if(!col)return;
  const cur=ST.q.topic;
  col.innerHTML='<div class="cw">'+topOrd.map(c=>'<span class="ch'+(c===cur?' on':'')+'" onclick="selCh(\'q\',\'topic\',\''+esc2(c)+'\',this)">'+esc(c)+'</span>').join('')+'</div>';
  const tog=document.getElementById('ft-q-topic');
  if(tog){const cnt=tog.querySelector('.fcnt');if(cnt)cnt.textContent='('+topOrd.length+')';}
}
function filterQ(){
  const q=(document.getElementById('si-q')||{value:''}).value.trim().toLowerCase();
  let arr=Q;
  if(q)arr=arr.filter(x=>x.q.toLowerCase().includes(q));
  if(ST.q.loc)arr=arr.filter(x=>x.tags.includes(ST.q.loc));
  if(ST.q.topic)arr=arr.filter(x=>x.tags.includes(ST.q.topic));
  document.getElementById('rc-q').textContent='共 '+arr.length+' 筆問題';
  renderQ(arr);
}
function renderQ(arr){
  document.getElementById('ql').innerHTML=arr.slice(0,300).map((item,idx)=>{
    const uid='q'+idx;
    const loc=item.tags.filter(t=>LOC_TAGS.has(t));
    const topic=item.tags.filter(t=>!LOC_TAGS.has(t));
    const hasLinks=(item.fi&&item.fi.length)||(item.hi&&item.hi.length)||(item.si&&item.si.length);
    let secs='';
    if(!hasLinks){
      secs+='<div style="margin-top:6px;padding-left:15px"><span class="notion-notice">📢 詳細內容請至notion版乾媽智囊團查看</span></div>';
    }
    if(item.fi&&item.fi.length){
      const items=item.fi.map(i=>'<div class="ci" onclick="jumpToItem(\''+esc2(F[i].name)+'\',\'f\',2)"><span class="ci-sq"></span><span>'+esc(F[i].name)+'</span>'+(F[i].cat?'<span class="ci-cat">'+(CAT[F[i].cat]||'')+'</span>':'')+'</div>').join('');
      secs+=mkCollapse(uid+'f','🍽️ 美食推薦',item.fi.length,items);
    }
    if(item.hi&&item.hi.length){
      const items=item.hi.map(i=>'<div class="ci" onclick="jumpToItem(\''+esc2(H[i].name)+'\',\'h\',3)"><span class="ci-sq"></span><span>'+esc(H[i].name)+'</span></div>').join('');
      secs+=mkCollapse(uid+'h','🏨 住宿推薦',item.hi.length,items);
    }
    if(item.si&&item.si.length){
      const items=item.si.map(i=>'<div class="ci" onclick="jumpToItem(\''+esc2(S[i].name)+'\',\'s\',4)"><span class="ci-sq"></span><span>'+esc(S[i].name)+'</span></div>').join('');
      secs+=mkCollapse(uid+'s','🗺️ 景點推薦',item.si.length,items);
    }
    if(item.rqi&&item.rqi.length){
      const items=item.rqi.map(i=>'<div class="ci" onclick="jumpToQ('+i+')"><span class="ci-sq"></span><span>'+esc(Q[i].q)+'</span></div>').join('');
      secs+=mkCollapse(uid+'r','🔗 相關問題',item.rqi.length,items);
    }
    return '<div class="qc'+(item.top?' hot':'')+'" data-qi="'+idx+'">'
      +'<div class="qt">'+(item.top?'<span style="font-size:14px">🔥</span>':'<span class="qsq"></span>')+'<span>'+esc(item.q)+'</span></div>'
      +'<div class="qr2">'+(item.date?'<span class="qdate">'+item.date+'</span>':'')+(item.top?'<span class="qhot">🔥 熱門問題</span>':'')+'</div>'
      +'<div class="qtags">'+loc.map(t=>'<span class="qtag qtag-'+(REGION_CLS[CITY_REGION[t]]||'t')+'">'+t+'</span>').join('')+topic.map(t=>'<span class="qtag qtag-t">'+t+'</span>').join('')+'</div>'
      +secs+'</div>';
  }).join('')||'<div class="empty">沒有找到相關問題</div>';
}
function jumpToQ(idx){
  goPage(1);
  clearSI('q');ST.q.loc='';ST.q.topic='';
  setTimeout(()=>{

    setTimeout(()=>{
      const card=document.querySelector('#ql [data-qi="'+idx+'"]');
      if(card){card.scrollIntoView({behavior:'smooth',block:'center'});card.style.boxShadow='0 0 0 3px var(--gold)';setTimeout(()=>card.style.boxShadow='',1500);}
    },300);
  },350);
}

function renderItems(cid,arr,type){
  const shown=arr.slice(0,150);
  document.getElementById(cid).innerHTML=shown.map((item,idx)=>{
    const cardId=type+'-c-'+idx;
    const catLabel=item.cat?CAT[item.cat]||item.cat:'';
    const isBranch=item.district==='有分店';
    const cityDisplay=(item.city_tags&&item.city_tags.length)?item.city_tags[0]:(item.city||'').split(',')[0].trim();
    const distStr=isBranch?(cityDisplay+'皆有分店'):(item.district||'');
    const ref=item.tiji||'';
    // Meta line: city badge + district
    let metaHtml='';
    if(cityDisplay)metaHtml+='<span class="meta-city">'+esc(cityDisplay)+'</span>';
    if(distStr&&distStr!==cityDisplay)metaHtml+='<span style="margin-left:4px">'+esc(distStr)+'</span>';
    // Category on next line
    const catHtml=(type==='f'&&catLabel)?'<div style="margin-top:3px"><span class="mcat">'+esc(catLabel)+'</span></div>':'';
    // Ref on next line
    const refHtml=ref?'<div style="margin-top:3px;font-size:11px;color:var(--txl)">'+esc(ref)+'</div>':'';
    // Links
    const links=[
      item.google?'<a class="lnk lnk-g" href="'+item.google+'" target="_blank">📍 Google Maps</a>':'',
      item.fb?'<a class="lnk lnk-f" href="'+item.fb+'" target="_blank">FB</a>':'',
      item.ig?'<a class="lnk lnk-i" href="'+item.ig+'" target="_blank">IG</a>':'',
      item.website?'<a class="lnk lnk-w" href="'+item.website+'" target="_blank">官網</a>':'',
    ].filter(Boolean).join('');
    // Related questions
    let qiHtml='';
    if(item.qi&&item.qi.length){
      const qitems=item.qi.map(qi=>'<div class="ci" onclick="jumpToQ('+qi+')"><span class="ci-sq"></span><span>'+esc(Q[qi].q)+'</span></div>').join('');
      qiHtml=mkCollapse(cardId+'q','💬 出現在這些問題',item.qi.length,qitems);
    }
    // Nearby
    const nbHtml=buildNearby(item,type);

    return '<div class="ic" id="'+cardId+'" data-name="'+esc(item.name||'')+'">'
      +'<div class="ih" onclick="togDet(\''+cardId+'-d\',\''+cardId+'-b\')">'
      +'<div style="flex:1">'
      +'<div class="in">'+esc(item.name||'')+'</div>'
      +'<div class="im">'+metaHtml+'</div>'
      +catHtml+refHtml
      +'</div>'
      +'<div class="ieb" id="'+cardId+'-b">▼</div>'
      +'</div>'
      +'<div class="idet" id="'+cardId+'-d">'
      +(item.review?'<div class="rev">'+esc(item.review)+'</div>':'<div class="rev" style="color:var(--gray)">（無心得）</div>')
      +(links?'<div class="lnks">'+links+'</div>':'')
      +qiHtml+nbHtml
      +'</div></div>';
  }).join('')||'<div class="empty">沒有找到相關資料</div>';
  if(arr.length>150)document.getElementById(cid).innerHTML+='<div class="empty">（顯示前150筆，請用搜尋或篩選縮小範圍）</div>';
}

function togDet(did,bid){
  const el=document.getElementById(did),btn=document.getElementById(bid);
  const op=el.classList.toggle('op');
  if(btn)btn.textContent=op?'▲':'▼';
}

// ===== NEARBY =====
function buildNearby(item,type){
  const cities=item.city_tags&&item.city_tags.length?item.city_tags:[(item.city||'').split(',')[0].trim()];
  const dist=item.district;
  const title=dist&&dist!=='有分店'?'📍 '+dist+'還有':'📍 附近還有';
  if(!dist||dist==='有分店'){
    return '<div class="csec"><div class="ctog" style="cursor:default"><span>'+title+'</span></div><div class="nb-none">【無】</div></div>';
  }
  const city=cities[0]||'';
  const k=city+':'+dist;
  const idx=DIST_IDX[k]||{f:[],h:[],s:[]};
  const self=item.name;
  const nf=idx.f.filter(x=>x.name!==self);
  const nh=idx.h.filter(x=>x.name!==self);
  const ns=idx.s.filter(x=>x.name!==self);
  if(!nf.length&&!nh.length&&!ns.length){
    return '<div class="csec"><div class="ctog" style="cursor:default"><span>'+title+'</span></div><div class="nb-none">【無】</div></div>';
  }
  const LIMIT=5;
  function mkG(label,arr2,nt,pg){
    if(!arr2.length)return'';
    const uid=(self+nt).replace(/[^a-zA-Z0-9]/g,'X');
    const shown=arr2.slice(0,LIMIT);
    const extra=arr2.slice(LIMIT);
    let html=arr2.length+'家）</div>'+shown.map(x=>'<div class="ci" onclick="jumpToItem(\''+esc2(x.name)+'\',\''+nt+'\','+pg+')">▸ <span>'+esc(x.name)+'</span>'+(nt==='f'&&x.cat?'<span class="ci-cat">'+(CAT[x.cat]||'')+'</span>':'')+'</div>').join('');
    if(extra.length){
      html+='<div class="cbody" id="nbx-'+uid+'">'+extra.map(x=>'<div class="ci" onclick="jumpToItem(\''+esc2(x.name)+'\',\''+nt+'\','+pg+')">▸ <span>'+esc(x.name)+'</span>'+(nt==='f'&&x.cat?'<span class="ci-cat">'+(CAT[x.cat]||'')+'</span>':'')+'</div>').join('')+'</div>';
      html+='<div class="nb-more" onclick="togNbX(\'nbx-'+uid+'\',this)">▶ 顯示更多 '+extra.length+' 家</div>';
    }
    return '<div style="margin-top:4px"><div style="font-size:11px;color:var(--gray);font-weight:600;margin-bottom:3px">'+label+'（'+html+'</div>';
  }
  const content=mkG('美食',nf,'f',2)+mkG('住宿',nh,'h',3)+mkG('景點',ns,'s',4);
  const total=nf.length+nh.length+ns.length;
  return mkCollapse('nb-'+(self+dist).replace(/[^a-zA-Z0-9]/g,'X'),title,total,content);
}
function togNbX(eid,btn){
  const el=document.getElementById(eid);if(!el)return;
  const op=el.classList.toggle('op');
  btn.textContent=op?'▲ 收起':'▶ 顯示更多';
}

// ===== JUMP TO ITEM =====
function jumpToItem(name,type,pg){
  goPage(pg);
  setTimeout(()=>{
    Object.keys(ST[type]).forEach(k=>ST[type][k]='');
    clearSI(type);
    if(type==='f'){rebuildFSub('');filterF();}
    else if(type==='h'){rebuildHSub('');filterH();}
    else if(type==='s'){rebuildSSub('');filterS();}
    setTimeout(()=>{
      const listId={f:'fl',h:'hl',s:'sl'}[type];
      const list=document.getElementById(listId);
      if(!list)return;
      // Find by data-name attribute
      let card=null;
      list.querySelectorAll('[data-name]').forEach(el=>{
        if(el.getAttribute('data-name')===name)card=el;
      });
      if(!card){
        // Fallback: search by REND index
        const idx2=REND[type].findIndex(x=>x.name===name);
        if(idx2>=0)card=document.getElementById(type+'-c-'+idx2);
      }
      if(!card)return;
      card.scrollIntoView({behavior:'smooth',block:'center'});
      const det=document.getElementById(card.id+'-d');
      const btn=document.getElementById(card.id+'-b');
      if(det&&!det.classList.contains('op')){det.classList.add('op');if(btn)btn.textContent='▲';}
      card.style.boxShadow='0 0 0 3px var(--gold)';
      setTimeout(()=>card.style.boxShadow='',1500);
    },400);
  },320);
}

// ===== HOME =====
function initHome(){
  document.getElementById('hgrid').innerHTML=[
    {lbl:'問題',cnt:Q.length,pg:1,ico:'🔍'},
    {lbl:'美食',cnt:F.length,pg:2,ico:'🍽️'},
    {lbl:'住宿',cnt:H.length,pg:3,ico:'🏨'},
    {lbl:'景點',cnt:S.length,pg:4,ico:'🗺️'},
  ].map(x=>'<div class="hcard" onclick="goPage('+x.pg+')">'
    +'<div class="hico">'+x.ico+'</div>'
    +'<div class="hlbl">'+x.lbl+'</div>'
    +'<div class="hnum">'+x.cnt.toLocaleString()+'</div>'
    +'</div>').join('');
}
function backTop(pgId){const el=document.getElementById(pgId);if(el)el.scrollTop=0;}

// ===== GROUP PURCHASE =====
function togGP(){
  const b=document.getElementById('gp-body'),a=document.getElementById('gp-arr');
  if(!b)return;
  const op=b.classList.toggle('op');
  if(a)a.classList.toggle('op',op);
}
function initGP(){
  const gpData=(typeof DB!=='undefined'&&DB.gp)||[];
  const el=document.getElementById('gp-count');
  const listEl=document.getElementById('gp-body');
  if(el)el.textContent=gpData.length.toLocaleString();
  if(!listEl)return;
  if(!gpData.length){
    listEl.innerHTML='<div style="font-size:12px;color:var(--gray);padding:4px 0">目前無進行中的團購</div>';
    return;
  }
  const sorted=gpData.slice().sort((a,b)=>((a.countdown==null?9999:a.countdown)-(b.countdown==null?9999:b.countdown)));
  listEl.innerHTML=sorted.map(item=>{
    const days=item.countdown!=null?item.countdown:null;
    const urg=(days!==null&&days<=3)?' urg':'';
    return '<div class="gp-item">'
      +'<div class="gp-item-name">'+esc(item.name||'')+'</div>'
      +'<div class="gp-item-row">'
      +(item.period?'<span>📅 '+esc(item.period)+'</span>':'')
      +(days!==null?'<span class="gp-cd'+urg+'">⏰ 剩'+days+'天</span>':'')
      +(item.url?'<a class="gp-link" href="'+item.url+'" target="_blank">🔗 前往購買</a>':'')
      +'</div></div>';
  }).join('');
}

// ===== VISITOR COUNTER =====
var VIS_PAGES=['home','q','f','h','s'];
function initVisitors(){
  VIS_PAGES.forEach(function(pg,i){
    var cnt=0;
    try{cnt=parseInt(localStorage.getItem('vis_'+pg)||'0');}catch(e){}
    try{
      if(!sessionStorage.getItem('vss_'+pg)){
        cnt++;
        localStorage.setItem('vis_'+pg,cnt);
        sessionStorage.setItem('vss_'+pg,'1');
      }
    }catch(e){}
    const el=document.getElementById('vis-'+i);
    if(el)el.textContent='• 有'+cnt+'人到訪';
  });
}
function onPageVisit(i){
  if(i<0||i>=VIS_PAGES.length)return;
  try{
    if(!sessionStorage.getItem('vss_'+VIS_PAGES[i])){
      const cnt=parseInt(localStorage.getItem('vis_'+VIS_PAGES[i])||'0')+1;
      localStorage.setItem('vis_'+VIS_PAGES[i],cnt);
      sessionStorage.setItem('vss_'+VIS_PAGES[i],'1');
      const el=document.getElementById('vis-'+i);
      if(el)el.textContent='• 有'+cnt+'人到訪';
    }
  }catch(e){}
}

// ===== UTILS =====
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function esc2(s){if(!s)return'';return String(s).replace(/'/g,"\\'");}

// ===== INIT =====
initHome();
window.addEventListener('load',function(){initVisitors();initGP();});
</script>
