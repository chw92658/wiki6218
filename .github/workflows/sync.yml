name: 同步 Notion 並更新網頁

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 下載專案檔案
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行同步腳本
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python notion_sync.py

      - name: 推送更新後的網頁
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html db_latest.json
          git diff --staged --quiet || git commit -m "🔄 自動同步 Notion 資料 $(date '+%Y-%m-%d %H:%M')"
          git push
